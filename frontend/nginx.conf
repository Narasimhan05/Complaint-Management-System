server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ─── React Router support ─────────────────────────────────────────
    # Without this, refreshing /admin/dashboard returns 404.
    # try_files checks: does the file exist? No → serve index.html
    # React Router then handles the route client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── API proxy to Spring Boot backend ─────────────────────────────
    # In Docker: "backend" resolves to the backend container's hostname
    # (set by docker-compose service name)
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ─── Cache static assets ──────────────────────────────────────────
    location ~* \.(js|css|png|jpg|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
