# ================================================================
# APPLICATION - complaint-management
# ================================================================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}
spring.application.name=complaint-management
server.port=8080

# ================================================================
# DATABASE - MySQL
# ================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/complaint_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ================================================================
# JPA / HIBERNATE
# ================================================================
# update = auto-create/alter tables on startup (good for dev)
# validate = only check schema, never modify (good for prod)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# ================================================================
# JWT
# ================================================================
app.jwt.secret=ComplaintMgmtSuperSecretKey2024ForHMACSHA256MustBe256BitsMinimum!
# 86400000 ms = 24 hours
app.jwt.expiration=86400000

# ================================================================
# EMAIL  (set app.mail.simulate=true to skip real sends in dev)
# ================================================================
app.mail.simulate=true
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-16-char-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ================================================================
# SLA SETTINGS
# ================================================================
# Complaints not resolved within this many hours will auto-escalate
app.sla.escalation-hours=48

# ================================================================
# CORS
# ================================================================
app.cors.allowed-origins=http://localhost:3000

# ================================================================
# SWAGGER / OPENAPI
# ================================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method
